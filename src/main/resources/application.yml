spring:
  application:
    name: Shop
  datasource:
    url: jdbc:h2:file:./src/main/resources/dbase
    driverClassName: org.h2.Driver
    username: sa
    password: password
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
  flyway:
    baseline-on-migrate: true
